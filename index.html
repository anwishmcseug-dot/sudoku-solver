<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku Solver — Instant Puzzle Solver</title>
  <meta name="description"
    content="A sleek, modern Sudoku Solver that uses an optimized backtracking algorithm. Enter your puzzle and get the solution instantly." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="container">
    <header class="header">
      <h1>Sudoku Solver</h1>
      <p class="subtitle">Enter your puzzle, hit Solve, and watch the magic.</p>
    </header>

    <div class="card">
      <div id="sudoku-board" class="board" role="grid" aria-label="Sudoku Board"></div>

      <div id="message-bar" class="message-bar hidden" role="alert"></div>

      <div class="controls">
        <button id="btn-solve" class="btn btn-primary" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
          Solve
        </button>
        <button id="btn-clear" class="btn btn-secondary" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18" />
            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
          </svg>
          Clear
        </button>
      </div>
    </div>

    <footer class="footer">
      <p>Built with ❤️ By Anwish</p>
    </footer>
  </main>

  <script src="solver.js"></script>
  <script src="app.js"></script>
</body>

</html>
